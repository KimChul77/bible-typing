<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성경 타자 연습 3탄</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background:
        linear-gradient(rgba(17, 37, 72, 0.45), rgba(17, 37, 72, 0.55)),
        linear-gradient(180deg, #6fa3ff 0%, #9cc2ff 35%, #dceaff 100%);
      color: #1b2e52;
    }

    .screen {
      width: 100%;
      min-height: 100vh;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .screen.active {
      display: flex;
    }

    .card {
      width: 100%;
      max-width: 920px;
      background: rgba(255,255,255,0.96);
      border-radius: 28px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.16);
      padding: 24px;
      backdrop-filter: blur(3px);
    }

    .title {
      text-align: center;
      font-size: 42px;
      font-weight: 900;
      color: #214a8a;
      margin: 0 0 10px 0;
    }

    .sub {
      text-align: center;
      font-size: 19px;
      color: #5d6f92;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .start-box {
      background: linear-gradient(180deg, #f7fbff 0%, #edf5ff 100%);
      border: 2px solid #d9e7ff;
      border-radius: 24px;
      padding: 30px 20px;
      text-align: center;
    }

    .start-verse {
      font-size: 31px;
      line-height: 1.7;
      font-weight: 800;
      color: #294879;
      margin-bottom: 16px;
      word-break: keep-all;
    }

    .main-btn {
      width: 100%;
      max-width: 380px;
      border: none;
      border-radius: 18px;
      padding: 18px 20px;
      font-size: 26px;
      font-weight: 900;
      cursor: pointer;
      background: #4d84ff;
      color: white;
      box-shadow: 0 8px 18px rgba(77,132,255,0.25);
    }

    .verse-box {
      background: #eef5ff;
      border: 2px solid #cfe0ff;
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 16px;
    }

    .verse-label {
      font-size: 18px;
      font-weight: 800;
      color: #3e5f97;
      margin-bottom: 12px;
    }

    .verse-text {
      font-size: 35px;
      line-height: 1.65;
      font-weight: 800;
      color: #22375d;
      word-break: keep-all;
    }

    .typing-input {
      width: 100%;
      min-height: 165px;
      resize: vertical;
      padding: 18px;
      font-size: 28px;
      line-height: 1.6;
      border-radius: 18px;
      border: 2px solid #bfd3ff;
      outline: none;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    }

    .typing-input:focus {
      border-color: #5d8dff;
      box-shadow: 0 0 0 4px rgba(93,141,255,0.12);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    button.action-btn {
      border: none;
      border-radius: 16px;
      padding: 15px 12px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-check { background: #4d84ff; color: white; }
    .btn-next { background: #20b26b; color: white; }
    .btn-reset { background: #edf2fb; color: #30415f; }
    .btn-home  { background: #ffcf57; color: #5e4500; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .info-box {
      background: #f7faff;
      border: 1px solid #d8e5ff;
      border-radius: 18px;
      padding: 14px;
      text-align: center;
    }

    .info-title {
      font-size: 15px;
      color: #6980aa;
      margin-bottom: 7px;
      font-weight: 800;
    }

    .info-value {
      font-size: 26px;
      font-weight: 900;
      color: #1c3d7a;
    }

    .result {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      font-size: 26px;
      font-weight: 900;
      text-align: center;
      background: #f1f5fb;
      color: #35507d;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.4;
    }

    .help {
      font-size: 16px;
      color: #6f7f97;
      margin-top: 14px;
      text-align: center;
      line-height: 1.5;
    }

    .small-share-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #fff7dc;
      color: #6b5200;
      font-size: 15px;
      text-align: center;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .buttons { grid-template-columns: repeat(2, 1fr); }
      .info-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 640px) {
      .title { font-size: 32px; }
      .sub { font-size: 16px; }
      .start-verse { font-size: 23px; }
      .verse-text { font-size: 24px; }
      .typing-input { font-size: 21px; min-height: 130px; }
      .info-grid { grid-template-columns: repeat(2, 1fr); }
      .info-value { font-size: 22px; }
      .result { font-size: 22px; }
      button.action-btn { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="screen active" id="startScreen">
    <div class="card">
      <h1 class="title">성경 타자 연습 3탄</h1>
      <div class="sub">말씀을 직접 입력하며 은혜롭게 연습해 보세요</div>

      <div class="start-box">
        <div class="start-verse">
          주의 말씀은 내 발에 등이요<br>
          내 길에 빛이니이다
        </div>
        <div class="sub" style="margin-bottom:18px;">시편 119:105</div>
        <button class="main-btn" id="startBtn">시작하기</button>
      </div>

      <div class="small-share-box">
        사이트를 웹에 올린 뒤 링크를 카카오톡 단톡방에 보내면 함께 사용할 수 있어요
      </div>
    </div>
  </div>

  <div class="screen" id="gameScreen">
    <div class="card">
      <h1 class="title">성경 타자 연습 3탄</h1>
      <div class="sub">구절을 보고 그대로 입력해 보세요</div>

      <div class="verse-box">
        <div class="verse-label" id="verseRef">구절</div>
        <div class="verse-text" id="verseText">불러오는 중...</div>
      </div>

      <textarea
        id="typingInput"
        class="typing-input"
        placeholder="여기에 성경 구절을 그대로 입력하세요"
      ></textarea>

      <div class="buttons">
        <button class="action-btn btn-check" id="checkBtn">정답 확인</button>
        <button class="action-btn btn-next" id="nextBtn">다음 구절</button>
        <button class="action-btn btn-reset" id="resetBtn">입력 지우기</button>
        <button class="action-btn btn-home" id="homeBtn">처음 화면</button>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-title">문제 번호</div>
          <div class="info-value" id="currentNum">1</div>
        </div>
        <div class="info-box">
          <div class="info-title">맞춘 개수</div>
          <div class="info-value" id="correctCount">0</div>
        </div>
        <div class="info-box">
          <div class="info-title">시도 횟수</div>
          <div class="info-value" id="tryCount">0</div>
        </div>
        <div class="info-box">
          <div class="info-title">정확도</div>
          <div class="info-value" id="accuracy">0%</div>
        </div>
        <div class="info-box">
          <div class="info-title">시간</div>
          <div class="info-value" id="timer">0초</div>
        </div>
      </div>

      <div class="result" id="resultBox">시작 후 말씀을 입력해 주세요</div>

      <div class="help">
        Ctrl + Enter = 정답 확인 / 정답이면 자동으로 다음 문제로 넘어갑니다
      </div>
    </div>
  </div>

  <script src="verses.js"></script>
  <script>
    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const startBtn = document.getElementById("startBtn");

    const verseRef = document.getElementById("verseRef");
    const verseText = document.getElementById("verseText");
    const typingInput = document.getElementById("typingInput");

    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const homeBtn = document.getElementById("homeBtn");

    const resultBox = document.getElementById("resultBox");
    const currentNum = document.getElementById("currentNum");
    const correctCountEl = document.getElementById("correctCount");
    const tryCountEl = document.getElementById("tryCount");
    const accuracyEl = document.getElementById("accuracy");
    const timerEl = document.getElementById("timer");

    let currentIndex = 0;
    let correctCount = 0;
    let tryCount = 0;
    let usedIndexes = [];
    let seconds = 0;
    let timerInterval = null;

    function normalizeText(text) {
      return text.replace(/\r\n/g, "\n").replace(/\s+/g, " ").trim();
    }

    function saveData() {
      localStorage.setItem("bibleTypingCorrectCount3", String(correctCount));
      localStorage.setItem("bibleTypingTryCount3", String(tryCount));
      localStorage.setItem("bibleTypingSeconds3", String(seconds));
    }

    function loadData() {
      correctCount = parseInt(localStorage.getItem("bibleTypingCorrectCount3") || "0", 10) || 0;
      tryCount = parseInt(localStorage.getItem("bibleTypingTryCount3") || "0", 10) || 0;
      seconds = parseInt(localStorage.getItem("bibleTypingSeconds3") || "0", 10) || 0;
    }

    function updateInfoUI() {
      correctCountEl.textContent = correctCount;
      tryCountEl.textContent = tryCount;
      currentNum.textContent = usedIndexes.length;
      const acc = tryCount > 0 ? Math.round((correctCount / tryCount) * 100) : 0;
      accuracyEl.textContent = acc + "%";
      timerEl.textContent = seconds + "초";
    }

    function setResult(message, bg, color) {
      resultBox.textContent = message;
      resultBox.style.background = bg;
      resultBox.style.color = color;
    }

    function getRandomIndex() {
      if (usedIndexes.length >= window.BIBLE_VERSES.length) {
        usedIndexes = [];
      }

      let idx;
      do {
        idx = Math.floor(Math.random() * window.BIBLE_VERSES.length);
      } while (usedIndexes.includes(idx) && usedIndexes.length < window.BIBLE_VERSES.length);

      usedIndexes.push(idx);
      return idx;
    }

    function loadVerse() {
      if (!window.BIBLE_VERSES || window.BIBLE_VERSES.length === 0) {
        verseRef.textContent = "오류";
        verseText.textContent = "verses.js 파일에 구절 데이터가 없습니다.";
        return;
      }

      currentIndex = getRandomIndex();
      const item = window.BIBLE_VERSES[currentIndex];
      verseRef.textContent = item.ref;
      verseText.textContent = item.text;
      typingInput.value = "";
      updateInfoUI();
      setResult("말씀을 입력한 뒤 정답 확인을 눌러 주세요", "#f1f5fb", "#35507d");

      setTimeout(() => typingInput.focus(), 80);
    }

    function startTimer() {
      if (timerInterval) return;
      timerInterval = setInterval(() => {
        seconds++;
        updateInfoUI();
        saveData();
      }, 1000);
    }

    function startGame() {
      startScreen.classList.remove("active");
      gameScreen.classList.add("active");
      loadData();
      updateInfoUI();
      loadVerse();
      startTimer();
    }

    function goHome() {
      gameScreen.classList.remove("active");
      startScreen.classList.add("active");
    }

    function resetInput() {
      typingInput.value = "";
      typingInput.focus();
      setResult("입력이 지워졌습니다", "#f1f5fb", "#35507d");
    }

    function nextVerse() {
      loadVerse();
    }

    function checkAnswer() {
      const answer = normalizeText(typingInput.value);
      const original = normalizeText(window.BIBLE_VERSES[currentIndex].text);

      if (!answer) {
        setResult("먼저 구절을 입력해 주세요", "#fff4df", "#8a5a00");
        return;
      }

      tryCount++;

      if (answer === original) {
        correctCount++;
        updateInfoUI();
        saveData();
        setResult("정답입니다! 자동으로 다음 문제로 이동합니다 🙏", "#e8fff2", "#0f7a43");
        setTimeout(() => {
          loadVerse();
        }, 1000);
      } else {
        updateInfoUI();
        saveData();
        setResult("아쉽습니다. 다시 한번 천천히 입력해 보세요.", "#ffeaea", "#a12626");
      }
    }

    startBtn.addEventListener("click", startGame);
    checkBtn.addEventListener("click", checkAnswer);
    nextBtn.addEventListener("click", nextVerse);
    resetBtn.addEventListener("click", resetInput);
    homeBtn.addEventListener("click", goHome);

    typingInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && e.ctrlKey) {
        checkAnswer();
      }
    });

    loadData();
  </script>
</body>
</html>
