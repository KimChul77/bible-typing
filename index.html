<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성경 타자 연습 8탄</title>

<style>
body {
  margin:0;
  font-family: 'Malgun Gothic', sans-serif;
  background:#000;
  color:#fff;
  text-align:center;
}

#startScreen {
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1200') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.start-content {
  position:relative;
  z-index:2;
}

h1 {
  font-size:36px;
  margin-bottom:20px;
}

button {
  padding:15px 25px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#gameScreen {
  display:none;
  padding:20px;
}

textarea {
  width:90%;
  height:120px;
  font-size:20px;
}

.top-bar {
  position:fixed;
  top:10px;
  right:10px;
}

</style>
</head>

<body>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b8c57.mp3" type="audio/mp3">
</audio>

<div class="top-bar">
<button onclick="toggleBGM()">🎵 찬양</button>
</div>

<div id="startScreen">
<div class="overlay"></div>
<div class="start-content">
<h1>🙏 성경 타자 연습 8탄</h1>
<p>예수님과 함께 말씀 연습</p>
<button onclick="startGame()">시작하기</button>
</div>
</div>

<div id="gameScreen">
<h2 id="verse"></h2>
<textarea id="input"></textarea><br><br>
<button onclick="check()">정답확인</button>
<button onclick="next()">다음</button>
<p id="result"></p>
</div>

<script>
const verses = [
"태초에 하나님이 천지를 창조하시니라.",
"여호와는 나의 목자시니 내게 부족함이 없으리로다.",
"쉬지 말고 기도하라.",
"항상 기뻐하라."
];

let current = 0;

function startGame(){
document.getElementById("startScreen").style.display="none";
document.getElementById("gameScreen").style.display="block";
load();
}

function load(){
document.getElementById("verse").innerText = verses[current];
document.getElementById("input").value="";
}

function check(){
let input = document.getElementById("input").value.trim();
if(input === verses[current]){
document.getElementById("result").innerText="정답 🙏";
}else{
document.getElementById("result").innerText="다시 시도";
}
}

function next(){
current = (current+1) % verses.length;
load();
}

function toggleBGM(){
let bgm = document.getElementById("bgm");
if(bgm.paused){ bgm.play(); } else { bgm.pause(); }
}
</script>

</body>
</html>
